name: Deploy TygoAI naar GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Code uitchecken
        uses: actions/checkout@v4

      - name: Node.js instellen
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Dependencies installeren
        working-directory: web
        run: npm ci

      - name: Site builden
        working-directory: web
        run: npm run build

      - name: GitHub Pages voorbereiden
        uses: actions/configure-pages@v5

      - name: Build uploaden
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deployen naar GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
